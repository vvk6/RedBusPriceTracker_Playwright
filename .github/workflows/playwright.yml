name: Redbus Price Tracker
on:
  schedule:
    # Runs 4 times a day (UTC)
    - cron: '30 2,7,12,17 * * *' # Adjusted to match IST: 8 AM, 1 PM, 6 PM, 11 PM
  workflow_dispatch: 

jobs:
  track-price:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # THE FIX: Wrap the command in xvfb-run to simulate a real display
        run: xvfb-run npx playwright test myBusPriceTracker.spec.ts

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            Screenshots/
            test-results/
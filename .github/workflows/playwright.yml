name: Redbus Price Tracker
on:
  schedule:
    # Runs 4 times a day (6 AM, 12 PM, 6 PM, 12 AM UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  track-price:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tracker
        env:
          # These must be set in your GitHub Repository Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx playwright test myBusPriceTracker.spec.ts

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: Screenshots/